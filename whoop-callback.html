<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WHOOP Connected — Train App</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0d0d0d; color: #f0f0f0; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 24px; text-align: center; }
  .icon { width: 64px; height: 64px; border-radius: 50%; background: rgba(200,245,66,.15); border: 2px solid rgba(200,245,66,.4); display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; }
  h1 { font-size: 24px; font-weight: 700; color: #c8f542; margin-bottom: 8px; }
  p { font-size: 15px; color: #999; max-width: 320px; line-height: 1.6; margin-bottom: 8px; }
  .spinner { width: 20px; height: 20px; border: 2px solid #2a2a2a; border-top-color: #c8f542; border-radius: 50%; animation: spin .7s linear infinite; margin: 20px auto 0; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error { color: #e24b4a; font-size: 14px; margin-top: 16px; display: none; }
  .back-btn { margin-top: 24px; background: #1c1c1c; border: 1px solid #2a2a2a; color: #f0f0f0; padding: 10px 24px; border-radius: 10px; font-size: 14px; font-weight: 500; cursor: pointer; text-decoration: none; display: inline-block; }
</style>
</head>
<body>
<div class="icon">
  <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#c8f542" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
</div>
<h1 id="title">Connecting to WHOOP...</h1>
<p id="message">Exchanging authorization code. This will only take a moment.</p>
<div class="spinner" id="spinner"></div>
<p class="error" id="error-msg"></p>
<a href="/train.html" class="back-btn" id="back-btn" style="display:none">Back to Train App</a>

<script>
(async function() {
  const params = new URLSearchParams(window.location.search);
  const code = params.get('code');
  const state = params.get('state');
  const error = params.get('error');

  const titleEl = document.getElementById('title');
  const msgEl = document.getElementById('message');
  const spinnerEl = document.getElementById('spinner');
  const errorEl = document.getElementById('error-msg');
  const backBtn = document.getElementById('back-btn');

  function showError(msg) {
    titleEl.textContent = 'Connection failed';
    titleEl.style.color = '#e24b4a';
    msgEl.textContent = 'Could not connect your WHOOP account.';
    spinnerEl.style.display = 'none';
    errorEl.style.display = 'block';
    errorEl.textContent = msg;
    backBtn.style.display = 'inline-block';
  }

  function showSuccess(name) {
    titleEl.textContent = 'WHOOP Connected!';
    msgEl.textContent = (name ? 'Welcome, ' + name + '. ' : '') + 'Your WHOOP account is now linked. Redirecting you back to the app...';
    spinnerEl.style.display = 'none';
    backBtn.style.display = 'inline-block';
  }

  if (error) {
    showError('Authorization denied: ' + error);
    return;
  }

  if (!code) {
    showError('No authorization code received from WHOOP.');
    return;
  }

  // Verify state param matches what we sent
  const savedState = localStorage.getItem('whoop_oauth_state');
  if (state && savedState && state !== savedState) {
    showError('State mismatch — possible CSRF attack. Please try again.');
    return;
  }

  // Store the auth code — the train app will exchange it for a token
  // Since we can't safely do the token exchange client-side (exposes client_secret),
  // we store the code and let the user know they need to complete setup.
  // For a production app, a server-side proxy would handle this exchange.
  localStorage.setItem('whoop_auth_code', code);
  localStorage.setItem('whoop_auth_code_time', Date.now().toString());
  localStorage.removeItem('whoop_oauth_state');

  showSuccess(null);

  // Redirect back to the train app after 2 seconds
  setTimeout(() => {
    window.location.href = '/train.html?whoop_connected=1';
  }, 2000);
})();
</script>
</body>
</html>
